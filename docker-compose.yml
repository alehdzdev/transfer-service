services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: transfers
      MYSQL_USER: app
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-papppass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - trafic_service_network

  db-test:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: transfers_test
      MYSQL_USER: app
      MYSQL_PASSWORD: apppass
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-papppass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - trafic_service_network

  transfer-service-web:
    build: .
    networks:
      - trafic_service_network
      - traefik
    volumes:
      - ./app:/app/app
    environment:
      DATABASE_URL: mysql+pymysql://app:apppass@db:3306/transfers
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.transferservice.rule=Host(`transfer-service.alehdzdev.com`)"
      - "traefik.http.routers.transferservice.entrypoints=websecure"
      - "traefik.http.routers.transferservice.tls.certresolver=le"
      - "traefik.http.services.transferservice.loadbalancer.server.port=8000"
      - "traefik.docker.network=traefik"

volumes:
  mysql_data:

networks:
  trafic_service_network:
    driver: bridge
  traefik:
    external: true
